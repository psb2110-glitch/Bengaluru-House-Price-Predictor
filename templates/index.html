<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bengaluru House Price Predictor</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #111827, #1f2937);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .main-card {
            margin-top: 40px;
            margin-bottom: 40px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .header-box {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            padding: 35px 20px;
            text-align: center;
        }

        .header-box h1 {
            font-size: 42px;
            font-weight: 800;
        }

        label {
            font-weight: 700;
            margin-top: 12px;
        }

        .section-title {
            font-weight: 800;
            margin-top: 25px;
            margin-bottom: 10px;
            color: #1f2937;
        }

        .btn-custom {
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 700;
            padding: 12px;
            border-radius: 10px;
        }

        .btn-predict {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
        }

        .btn-recommend {
            background: linear-gradient(135deg, #16a34a, #059669);
        }

        .btn-compare {
            background: linear-gradient(135deg, #f97316, #ea580c);
        }

        .btn-emi {
            background: linear-gradient(135deg, #0f766e, #0891b2);
        }

        .result-card {
            background: #f8fafc;
            border-radius: 15px;
            padding: 25px;
            margin-top: 25px;
            border-left: 6px solid #2563eb;
        }

        .recommend-card {
            background: #f0fdf4;
            border-radius: 15px;
            padding: 25px;
            margin-top: 25px;
            border-left: 6px solid #16a34a;
        }

        .compare-card {
            background: #fff7ed;
            border-radius: 15px;
            padding: 25px;
            margin-top: 25px;
            border-left: 6px solid #f97316;
        }

        .emi-card {
            background: #ecfeff;
            border-radius: 15px;
            padding: 25px;
            margin-top: 25px;
            border-left: 6px solid #0891b2;
        }

        .price {
            font-size: 36px;
            font-weight: 800;
            color: #16a34a;
        }

        .info-box {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-top: 12px;
            border: 1px solid #e5e7eb;
        }

        .small-price {
            font-size: 25px;
            font-weight: 800;
            color: #2563eb;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card main-card">
        <div class="header-box">
            <h1>Bengaluru House Price Predictor</h1>
            <p>Predict prices, compare properties, calculate EMI, and get budget-based recommendations</p>
        </div>

        <div class="card-body p-4">

            <h4 class="section-title">House Price Prediction</h4>

            <form id="predictForm">
                <div class="row">
                    <div class="col-md-6">
                        <label>Select Location</label>
                        <select class="form-control" id="location" name="location" required>
                            {% for location in locations %}
                                <option value="{{ location }}">{{ location }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label>Enter BHK</label>
                        <input type="number" class="form-control" id="bhk" name="bhk" placeholder="Example: 2" required>
                    </div>

                    <div class="col-md-6">
                        <label>Enter Number of Bathrooms</label>
                        <input type="number" class="form-control" id="bath" name="bath" placeholder="Example: 2" required>
                    </div>

                    <div class="col-md-6">
                        <label>Enter Square Feet</label>
                        <input type="number" class="form-control" id="total_sqft" name="total_sqft" placeholder="Example: 1200" required>
                    </div>

                    <div class="col-md-12 mt-4">
                        <button type="button" class="btn btn-custom btn-predict form-control" onclick="predict_price()">Predict Price</button>
                    </div>
                </div>
            </form>

            <div id="prediction"></div>

            <hr class="mt-5">

            <h4 class="section-title">Budget Based Property Recommendations</h4>

            <form id="recommendForm">
                <div class="row">
                    <div class="col-md-12">
                        <label>Enter Your Budget</label>
                        <input type="number" class="form-control" id="budget" name="budget" placeholder="Example: 8000000" required>
                    </div>

                    <div class="col-md-12 mt-4">
                        <button type="button" class="btn btn-custom btn-recommend form-control" onclick="get_recommendations()">Get Recommendations</button>
                    </div>
                </div>
            </form>

            <div id="recommendations"></div>

            <hr class="mt-5">

            <h4 class="section-title">House Comparison Tool</h4>

            <form id="compareForm">
                <div class="row">
                    <h5 class="mt-2">Property 1</h5>

                    <div class="col-md-6">
                        <label>Location 1</label>
                        <select class="form-control" name="location1" required>
                            {% for location in locations %}
                                <option value="{{ location }}">{{ location }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label>BHK</label>
                        <input type="number" class="form-control" name="bhk1" required>
                    </div>

                    <div class="col-md-2">
                        <label>Bath</label>
                        <input type="number" class="form-control" name="bath1" required>
                    </div>

                    <div class="col-md-2">
                        <label>Sqft</label>
                        <input type="number" class="form-control" name="sqft1" required>
                    </div>

                    <h5 class="mt-4">Property 2</h5>

                    <div class="col-md-6">
                        <label>Location 2</label>
                        <select class="form-control" name="location2" required>
                            {% for location in locations %}
                                <option value="{{ location }}">{{ location }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label>BHK</label>
                        <input type="number" class="form-control" name="bhk2" required>
                    </div>

                    <div class="col-md-2">
                        <label>Bath</label>
                        <input type="number" class="form-control" name="bath2" required>
                    </div>

                    <div class="col-md-2">
                        <label>Sqft</label>
                        <input type="number" class="form-control" name="sqft2" required>
                    </div>

                    <div class="col-md-12 mt-4">
                        <button type="button" class="btn btn-custom btn-compare form-control" onclick="compare_properties()">Compare Properties</button>
                    </div>
                </div>
            </form>

            <div id="comparison"></div>

            <hr class="mt-5">

            <h4 class="section-title">EMI Calculator</h4>

            <form id="emiForm">
                <div class="row">
                    <div class="col-md-6">
                        <label>Property Price</label>
                        <input type="number" class="form-control" name="property_price" placeholder="Example: 10000000" required>
                    </div>

                    <div class="col-md-6">
                        <label>Down Payment</label>
                        <input type="number" class="form-control" name="down_payment" placeholder="Example: 2000000" required>
                    </div>

                    <div class="col-md-6">
                        <label>Interest Rate (%)</label>
                        <input type="number" step="0.1" class="form-control" name="interest_rate" placeholder="Example: 8.5" required>
                    </div>

                    <div class="col-md-6">
                        <label>Loan Tenure (Years)</label>
                        <input type="number" class="form-control" name="loan_years" placeholder="Example: 20" required>
                    </div>

                    <div class="col-md-12 mt-4">
                        <button type="button" class="btn btn-custom btn-emi form-control" onclick="calculate_emi()">Calculate EMI</button>
                    </div>
                </div>
            </form>

            <div id="emiResult"></div>

        </div>
    </div>
</div>

<script>
    function predict_price() {
        var fd = new FormData(document.getElementById('predictForm'));
        var xhr = new XMLHttpRequest();

        xhr.open('POST', '/predict', true);

        document.getElementById("prediction").innerHTML =
            `<div class="result-card text-center">
                <div class="spinner-border text-primary"></div>
                <h4 class="mt-3">Please wait... Predicting price</h4>
            </div>`;

        xhr.onreadystatechange = function () {
            if (xhr.readyState === XMLHttpRequest.DONE) {
                var result = JSON.parse(xhr.responseText);

                document.getElementById('prediction').innerHTML =
                    `<div class="result-card">
                        <div class="text-center">
                            <h3>Predicted House Price</h3>
                            <div class="price">₹${result.price}</div>
                        </div>

                        <div class="info-box">
                            <h4>Estimated Price Range</h4>
                            <p>₹${result.lower_range} - ₹${result.upper_range}</p>
                        </div>

                        <div class="info-box">
                            <h4>Property Details</h4>
                            <p><b>Location:</b> ${result.location}</p>
                            <p><b>BHK:</b> ${result.bhk}</p>
                            <p><b>Bathrooms:</b> ${result.bath}</p>
                            <p><b>Area:</b> ${result.sqft} sq.ft</p>
                        </div>

                        <div class="info-box">
                            <h4>Location Insight</h4>
                            <p>Average price in <b>${result.location}</b>: ₹${result.avg_location_price}</p>
                        </div>
                    </div>`;
            }
        };

        xhr.send(fd);
    }


    function get_recommendations() {
        var fd = new FormData(document.getElementById('recommendForm'));
        var xhr = new XMLHttpRequest();

        xhr.open('POST', '/recommend', true);

        document.getElementById("recommendations").innerHTML =
            `<div class="recommend-card text-center">
                <div class="spinner-border text-success"></div>
                <h4 class="mt-3">Finding best locations for your budget</h4>
            </div>`;

        xhr.onreadystatechange = function () {
            if (xhr.readyState === XMLHttpRequest.DONE) {
                var result = JSON.parse(xhr.responseText);

                var html = `<div class="recommend-card">
                    <h3 class="text-center">Recommended Locations</h3>
                    <p class="text-center">For your budget: <b>₹${result.budget}</b></p>`;

                if (result.recommendations.length > 0) {
                    result.recommendations.forEach(function(item) {
                        html += `<div class="info-box">
                            <h5>${item.location}</h5>
                            <p><b>Average Price:</b> ₹${item.avg_price}</p>
                        </div>`;
                    });
                } else {
                    html += `<div class="info-box text-center">
                        <h5>No close matches found</h5>
                        <p>Try increasing or decreasing your budget.</p>
                    </div>`;
                }

                html += `</div>`;
                document.getElementById("recommendations").innerHTML = html;
            }
        };

        xhr.send(fd);
    }


    function compare_properties() {
        var fd = new FormData(document.getElementById('compareForm'));
        var xhr = new XMLHttpRequest();

        xhr.open('POST', '/compare', true);

        document.getElementById("comparison").innerHTML =
            `<div class="compare-card text-center">
                <div class="spinner-border text-warning"></div>
                <h4 class="mt-3">Comparing properties...</h4>
            </div>`;

        xhr.onreadystatechange = function () {
            if (xhr.readyState === XMLHttpRequest.DONE) {
                var result = JSON.parse(xhr.responseText);

                document.getElementById("comparison").innerHTML =
                    `<div class="compare-card">
                        <h3 class="text-center">Property Comparison Result</h3>

                        <div class="row mt-3">
                            <div class="col-md-6">
                                <div class="info-box text-center">
                                    <h4>Property 1</h4>
                                    <p><b>Location:</b> ${result.location1}</p>
                                    <div class="small-price">₹${result.price1}</div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="info-box text-center">
                                    <h4>Property 2</h4>
                                    <p><b>Location:</b> ${result.location2}</p>
                                    <div class="small-price">₹${result.price2}</div>
                                </div>
                            </div>
                        </div>

                        <div class="info-box text-center">
                            <h4>Price Difference</h4>
                            <div class="small-price">₹${result.difference}</div>
                            <p class="mt-2"><b>${result.better}</b></p>
                        </div>
                    </div>`;
            }
        };

        xhr.send(fd);
    }


    function calculate_emi() {
        var fd = new FormData(document.getElementById('emiForm'));
        var xhr = new XMLHttpRequest();

        xhr.open('POST', '/emi', true);

        document.getElementById("emiResult").innerHTML =
            `<div class="emi-card text-center">
                <div class="spinner-border text-info"></div>
                <h4 class="mt-3">Calculating EMI...</h4>
            </div>`;

        xhr.onreadystatechange = function () {
            if (xhr.readyState === XMLHttpRequest.DONE) {
                var result = JSON.parse(xhr.responseText);

                document.getElementById("emiResult").innerHTML =
                    `<div class="emi-card">
                        <h3 class="text-center">EMI Calculation Result</h3>

                        <div class="info-box">
                            <p><b>Property Price:</b> ₹${result.property_price}</p>
                            <p><b>Down Payment:</b> ₹${result.down_payment}</p>
                            <p><b>Loan Amount:</b> ₹${result.loan_amount}</p>
                        </div>

                        <div class="info-box text-center">
                            <h4>Estimated Monthly EMI</h4>
                            <div class="price">₹${result.emi}</div>
                        </div>
                    </div>`;
            }
        };

        xhr.send(fd);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
